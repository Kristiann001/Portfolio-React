name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup with npm cache ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: portfolio-react/package-lock.json

      # ── 3. Install dependencies (clean install) ───────────────────────────
      - name: Install dependencies
        working-directory: portfolio-react
        run: npm ci

      # ── 4. TypeScript type-check (no emit — catches type errors fast) ─────
      - name: TypeScript type-check
        working-directory: portfolio-react
        run: npx tsc --noEmit

      # ── 5. ESLint ─────────────────────────────────────────────────────────
      - name: Run ESLint
        working-directory: portfolio-react
        run: npm run lint

      # ── 6. Production build ───────────────────────────────────────────────
      - name: Build project
        working-directory: portfolio-react
        env:
          # Provide stub env vars so Vite doesn't fail on missing imports
          VITE_SUPABASE_URL: "https://placeholder.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "placeholder_key"
          VITE_ADMIN_PASSWORD: "placeholder"
        run: npm run build

      # ── 7. Upload build artifact (7-day retention) ────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: portfolio-react/dist
          retention-days: 7

